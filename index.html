<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3ª Revolução Industrial · Era Técnico-Científica</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        :root {
            --primary: #0088ff;
            --primary-light: #00c3ff;
            --accent: #00e5ff;
            --bg: #070b14;
            --bg-card: rgba(10, 20, 40, 0.8);
            --border: rgba(0, 200, 255, 0.3);
            --text: #e0f0ff;
            --text-muted: #b0c8e0;
            --glow: rgba(0, 150, 255, 0.4);
            --ease-smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-elastic: cubic-bezier(0.5, 1.8, 0.8, 1.2);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh;
            overflow: hidden;
            perspective: 1800px;
        }

        #networkCanvas {
            position: fixed;
            inset: 0;
            z-index: -2;
            opacity: 0.45;
            pointer-events: none;
        }

        /* Cursor cibernético */
        #cursor {
            width: 22px;
            height: 22px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s, border-color 0.2s, background 0.2s, box-shadow 0.2s;
            background: transparent;
            box-shadow: 0 0 18px var(--glow), 0 0 8px var(--primary);
            backdrop-filter: blur(2px);
        }
        #cursor::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 12px var(--accent);
        }
        #cursor.active {
            width: 48px;
            height: 48px;
            border-color: #ffffff;
            background: rgba(0, 200, 255, 0.15);
            box-shadow: 0 0 40px #00e5ff, 0 0 20px #0088ff;
        }

        .stage {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slider-container {
            width: 92%;
            max-width: 1400px;
            height: 780px;
            position: relative;
            transition: transform 0.06s linear;
        }

        .slide {
            position: absolute;
            inset: 0;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            align-items: center;
            gap: 2.5rem;
            opacity: 0;
            visibility: hidden;
            transform: translateZ(-400px) rotateY(20deg) scale(0.92);
            transition: opacity 0.7s var(--ease-smooth), visibility 0.7s, transform 0.8s var(--ease-bounce);
            filter: blur(10px);
        }

        .slide.active {
            opacity: 1;
            visibility: visible;
            transform: translateZ(0) rotateY(0deg) scale(1);
            filter: blur(0);
        }

        .info-panel {
            padding: 1rem 0 1rem 2rem;
            animation: panelReveal 0.9s var(--ease-bounce);
        }

        @keyframes panelReveal {
            0% { opacity: 0; transform: translateX(-70px) rotateY(-15deg); }
            100% { opacity: 1; transform: translateX(0) rotateY(0); }
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 8px 24px;
            background: rgba(0, 150, 255, 0.12);
            border: 1px solid var(--border);
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 2rem;
            backdrop-filter: blur(6px);
            box-shadow: 0 0 14px rgba(0,200,255,0.15);
            animation: badgePulse 3s infinite alternate;
        }

        @keyframes badgePulse {
            0% { box-shadow: 0 0 5px rgba(0,200,255,0.1); }
            100% { box-shadow: 0 0 22px rgba(0,200,255,0.45); }
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3.4rem;
            font-weight: 800;
            line-height: 1.15;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #ffffff 0%, #00c3ff 50%, #0088ff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            animation: floatTitle 4s ease-in-out infinite;
            text-shadow: 0 0 20px rgba(0,200,255,0.2);
        }

        @keyframes floatTitle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(22px);
            border: 1px solid var(--border);
            border-radius: 34px;
            padding: 2rem 2rem;
            transition: all 0.45s var(--ease-elastic);
            box-shadow: 0 25px 40px -15px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,180,255,0.1) inset;
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .glass-card:hover {
            transform: translateY(-8px) translateZ(25px) scale(1.02);
            box-shadow: 0 35px 55px -20px #000000, 0 0 0 2px var(--accent) inset;
            border-color: var(--accent);
        }

        .card-content {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.65;
            max-height: 520px;
            overflow-y: auto;
            padding-right: 8px;
            scrollbar-width: thin;
        }
        .card-content::-webkit-scrollbar { width: 5px; }
        .card-content::-webkit-scrollbar-track { background: rgba(0,100,200,0.12); border-radius: 8px; }
        .card-content::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 8px; }

        .feature-list {
            list-style: none;
            padding: 0;
        }
        .feature-list li {
            margin-bottom: 0.9rem;
            display: flex;
            gap: 1rem;
            align-items: baseline;
            transition: transform 0.2s;
        }
        .feature-list li:hover {
            transform: translateX(8px);
            color: #ffffff;
        }
        .feature-list i {
            width: 28px;
            color: var(--accent);
            font-size: 1.2rem;
            filter: drop-shadow(0 0 6px var(--accent));
        }

        .hero-wrap {
            position: relative;
            height: 100%;
            display: grid;
            place-items: center;
            perspective: 800px;
        }

        .hero-visual {
            font-size: 11rem;
            color: var(--accent);
            filter: drop-shadow(0 0 30px #0088ff) drop-shadow(0 0 15px #00c3ff);
            animation: gentleFloat 5.5s ease-in-out infinite;
            will-change: transform;
            transition: all 0.4s;
        }

        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-16px) rotate(2deg); }
        }

        .hero-ring {
            position: absolute;
            width: 300px;
            height: 300px;
            border: 2px dashed var(--primary-light);
            border-radius: 50%;
            opacity: 0.2;
            animation: spin 22s linear infinite;
        }
        .hero-ring-2 {
            position: absolute;
            width: 440px;
            height: 440px;
            border: 1.5px solid rgba(0, 200, 255, 0.3);
            border-radius: 50%;
            animation: spinReverse 30s linear infinite;
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes spinReverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }

        .nav-ui {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 40px;
            padding: 12px 36px;
            background: rgba(5, 15, 30, 0.8);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 60px;
            z-index: 1000;
            box-shadow: 0 10px 30px -10px #000000, 0 0 0 1px rgba(0,200,255,0.1);
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.3s var(--ease-bounce);
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 40px;
        }
        .nav-btn:hover { 
            transform: scale(1.25); 
            color: #fff;
            text-shadow: 0 0 25px var(--accent);
            background: rgba(0,200,255,0.08);
        }

        .slide-counter {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.6rem;
            color: var(--accent);
            letter-spacing: 5px;
            text-shadow: 0 0 12px var(--primary);
        }

        .progress-line {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #0088ff, #00e5ff, #ffffff, #00e5ff, #0088ff);
            background-size: 200% 100%;
            animation: progressShine 2s linear infinite;
            transition: width 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 2000;
            box-shadow: 0 0 20px #00e5ff;
        }

        @keyframes progressShine {
            0% { background-position: 0% 0; }
            100% { background-position: 200% 0; }
        }

        .slide.active .info-panel .badge { animation: slideUpFade 0.6s var(--ease-bounce) forwards; }
        .slide.active h1 { animation: slideUpFade 0.6s var(--ease-bounce) 0.07s forwards; }
        .slide.active .glass-card { animation: slideUpFade 0.6s var(--ease-bounce) 0.13s forwards; }
        .slide.active .hero-wrap { animation: slideRightFade 0.6s var(--ease-bounce) 0.07s forwards; }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideRightFade {
            from { opacity: 0; transform: translateX(50px) rotateY(10deg); }
            to { opacity: 1; transform: translateX(0) rotateY(0); }
        }

        @media (max-width: 950px) {
            .slide { grid-template-columns: 1fr; }
            h1 { font-size: 2.2rem; }
            .hero-visual { font-size: 6rem; }
            .slider-container { height: auto; min-height: 700px; }
        }
    </style>
</head>
<body>

    <canvas id="networkCanvas"></canvas>
    <div id="cursor"></div>
    <div class="progress-line" id="bar"></div>

    <div class="stage">
        <div class="slider-container" id="slider"></div>
    </div>

    <nav class="nav-ui">
        <button class="nav-btn" id="prevBtn"><i class="fa-solid fa-chevron-left"></i></button>
        <div class="slide-counter" id="counter">01</div>
        <button class="nav-btn" id="nextBtn"><i class="fa-solid fa-chevron-right"></i></button>
    </nav>

    <script>
        (function(){
            "use strict";

            // ========== FUNDO DE REDE TECNOLÓGICA (CANVAS) ==========
            const canvas = document.getElementById('networkCanvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            const particles = [];
            const numParticles = 75;
            const connectionDistance = 130;

            function resizeCanvas() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            class Particle {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.vx = (Math.random() - 0.5) * 0.35;
                    this.vy = (Math.random() - 0.5) * 0.35;
                    this.radius = 1.4 + Math.random() * 1.8;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 0 || this.x > width) this.vx *= -1;
                    if (this.y < 0 || this.y > height) this.vy *= -1;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(0, 180, 255, 0.55)';
                    ctx.fill();
                }
            }

            for (let i = 0; i < numParticles; i++) {
                particles.push(new Particle());
            }

            function drawNetwork() {
                ctx.clearRect(0, 0, width, height);
                for (let i = 0; i < particles.length; i++) {
                    particles[i].update();
                    particles[i].draw();
                }
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < connectionDistance) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            const opacity = 1 - dist / connectionDistance;
                            ctx.strokeStyle = `rgba(0, 200, 255, ${opacity * 0.15})`;
                            ctx.lineWidth = 0.7;
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(drawNetwork);
            }
            drawNetwork();

            // ========== DADOS DOS SLIDES – ALINHAMENTO PERFEITO ==========
            const slidesData = [
                {   // Slide 1 – Título (referência de alinhamento)
                    title: "3ª Revolução Industrial",
                    icon: "fa-microchip",
                    color: "#0088ff",
                    badge: "Revolução Técnico-Científica",
                    content: `<p style="font-size:1.15rem; margin-bottom:1.8rem;"><strong>Iniciada após 1950</strong>, marcou a fusão entre ciência, tecnologia e produção.</p>
                    <ul class="feature-list">
                        <li><i class="fas fa-calendar-alt"></i> <strong>Início após 1950</strong></li>
                        <li><i class="fas fa-rocket"></i> <strong>Avanço acelerado da tecnologia</strong></li>
                        <li><i class="fas fa-laptop-code"></i> <strong>Uso intensivo da informática e internet</strong></li>
                        <li><i class="fas fa-industry"></i> <strong>Modernização das indústrias</strong></li>
                    </ul>
                    <p style="margin-top:1.8rem; font-style:italic; border-left:3px solid var(--accent); padding-left:1rem;">A era da informação e da automação inteligente.</p>`,
                    meta: "Informática · Internet · Automação"
                },
                {   // Slide 2 – Principais Mudanças
                    title: "⚙️ Principais Mudanças",
                    icon: "fa-robot",
                    color: "#0099ff",
                    badge: "Transformações estruturais",
                    content: `<ul class="feature-list">
                        <li><i class="fas fa-robot"></i> <strong>Automação das fábricas</strong></li>
                        <li><i class="fas fa-globe-americas"></i> <strong>Globalização da economia</strong></li>
                        <li><i class="fas fa-tachometer-alt"></i> <strong>Produção mais rápida e eficiente</strong></li>
                        <li><i class="fas fa-satellite-dish"></i> <strong>Desenvolvimento das telecomunicações</strong></li>
                        <li><i class="fas fa-desktop"></i> <strong>Maior uso de computadores</strong></li>
                    </ul>`,
                    meta: "Automação · Globalização"
                },
                {   // Slide 3 – Mudanças no Trabalho
                    title: "👩‍💻 Mudanças no Trabalho",
                    icon: "fa-user-cog",
                    color: "#00a6ff",
                    badge: "Novas profissões",
                    content: `<ul class="feature-list">
                        <li><i class="fas fa-cogs"></i> <strong>Máquinas substituindo trabalhos manuais</strong></li>
                        <li><i class="fas fa-briefcase"></i> <strong>Surgimento de novas profissões</strong></li>
                        <li><i class="fas fa-graduation-cap"></i> <strong>Necessidade de mais estudo e qualificação</strong></li>
                        <li><i class="fas fa-laptop"></i> <strong>Uso de computadores no trabalho</strong></li>
                        <li><i class="fas fa-wifi"></i> <strong>Trabalho mais conectado à internet</strong></li>
                    </ul>`,
                    meta: "Qualificação · Tecnologia"
                },
                {   // Slide 4 – Tecnologias Surgidas
                    title: "📡 Tecnologias Surgidas",
                    icon: "fa-satellite",
                    color: "#00b3ff",
                    badge: "Inovações disruptivas",
                    content: `<div style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:1rem;">
                        <span style="background:rgba(0,150,255,0.15); padding:5px 15px; border-radius:30px;"><i class="fas fa-desktop"></i> Computadores</span>
                        <span style="background:rgba(0,150,255,0.15); padding:5px 15px; border-radius:30px;"><i class="fas fa-globe"></i> Internet</span>
                        <span style="background:rgba(0,150,255,0.15); padding:5px 15px; border-radius:30px;"><i class="fas fa-mobile-alt"></i> Celulares</span>
                        <span style="background:rgba(0,150,255,0.15); padding:5px 15px; border-radius:30px;"><i class="fas fa-robot"></i> Robôs industriais</span>
                        <span style="background:rgba(0,150,255,0.15); padding:5px 15px; border-radius:30px;"><i class="fas fa-satellite"></i> Satélites</span>
                        <span style="background:rgba(0,150,255,0.15); padding:5px 15px; border-radius:30px;"><i class="fas fa-dna"></i> Biotecnologia</span>
                        <span style="background:rgba(0,150,255,0.15); padding:5px 15px; border-radius:30px;"><i class="fas fa-atom"></i> Energia nuclear</span>
                    </div>
                    <p>Essas tecnologias redefiniram a vida cotidiana e os meios de produção.</p>`,
                    meta: "Inovação · Conectividade"
                },
                {   // Slide 5 – Impactos Positivos (ajustado para caber sem corte)
                    title: "✅ Impactos Positivos",
                    icon: "fa-thumbs-up",
                    color: "#00ccff",
                    badge: "Benefícios globais",
                    content: `<ul class="feature-list" style="margin-bottom:0.5rem;">
                        <li><i class="fas fa-comments"></i> <strong>Comunicação mais rápida</strong></li>
                        <li><i class="fas fa-heartbeat"></i> <strong>Avanços na medicina</strong></li>
                        <li><i class="fas fa-search"></i> <strong>Acesso fácil à informação</strong></li>
                        <li><i class="fas fa-chart-line"></i> <strong>Maior produção industrial</strong></li>
                        <li><i class="fas fa-microchip"></i> <strong>Desenvolvimento tecnológico contínuo</strong></li>
                    </ul>`,
                    meta: "Saúde · Comunicação"
                },
                {   // Slide 6 – Impactos Negativos
                    title: "⚠️ Impactos Negativos",
                    icon: "fa-exclamation-triangle",
                    color: "#ff5555",
                    badge: "Desafios contemporâneos",
                    content: `<ul class="feature-list">
                        <li><i class="fas fa-user-slash"></i> <strong>Desemprego tecnológico</strong></li>
                        <li><i class="fas fa-smog"></i> <strong>Poluição ambiental</strong></li>
                        <li><i class="fas fa-mobile-alt"></i> <strong>Dependência da tecnologia</strong></li>
                        <li><i class="fas fa-balance-scale"></i> <strong>Desigualdade social</strong></li>
                        <li><i class="fas fa-wifi-slash"></i> <strong>Exclusão digital</strong></li>
                    </ul>`,
                    meta: "Desemprego · Meio ambiente"
                },
                {   // Slide 7 – Conclusão (ajustado para caber perfeitamente)
                    title: "🧠 Conclusão",
                    icon: "fa-lightbulb",
                    color: "#ffffff",
                    badge: "Síntese",
                    content: `<p style="font-size:1.1rem; line-height:1.7;">A <strong>3ª Revolução Industrial</strong> transformou o mundo com o avanço da tecnologia, mudando a economia, o trabalho e a vida das pessoas.</p>
                    <p style="margin-top:1.5rem;">Conectividade, automação e conhecimento passaram a ser os novos motores da sociedade.</p>
                    <div style="margin-top:1.8rem; display:flex; gap:12px; flex-wrap:wrap;">
                        <span style="background:#0088ff20; padding:6px 18px; border-radius:40px;"><i class="fas fa-globe"></i> Global</span>
                        <span style="background:#0088ff20; padding:6px 18px; border-radius:40px;"><i class="fas fa-robot"></i> Digital</span>
                    </div>`,
                    meta: "Fim da apresentação"
                }
            ];

            let currentIdx = 0;
            const slider = document.getElementById('slider');
            const bar = document.getElementById('bar');
            const counter = document.getElementById('counter');
            const cursor = document.getElementById('cursor');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');

            slider.innerHTML = '';
            slidesData.forEach((s, i) => {
                const slideDiv = document.createElement('div');
                slideDiv.className = `slide ${i === 0 ? 'active' : ''}`;
                slideDiv.innerHTML = `
                    <div class="info-panel">
                        <div class="badge"><i class="fas fa-tag"></i> ${s.badge}</div>
                        <h1>${s.title}</h1>
                        <div class="glass-card" data-card style="border-left: 5px solid ${s.color}">
                            <div class="card-content">${s.content}</div>
                            <div style="margin-top:1.2rem; font-size:0.8rem; color:${s.color}; opacity:0.9;"><i class="fa-regular fa-compass"></i> ${s.meta}</div>
                        </div>
                    </div>
                    <div class="hero-wrap">
                        <div class="hero-ring"></div>
                        <div class="hero-ring-2"></div>
                        <i class="fa-solid ${s.icon} hero-visual" style="color:${s.color};"></i>
                    </div>
                `;
                slider.appendChild(slideDiv);
            });

            const slides = document.querySelectorAll('.slide');

            function updateUI() {
                const curr = slidesData[currentIdx];
                bar.style.width = `${((currentIdx + 1) / slidesData.length) * 100}%`;
                counter.innerText = (currentIdx + 1).toString().padStart(2, '0');
            }

            function moveSlide(delta) {
                slides[currentIdx].classList.remove('active');
                currentIdx = (currentIdx + delta + slidesData.length) % slidesData.length;
                slides[currentIdx].classList.add('active');
                updateUI();
                const btn = delta > 0 ? nextBtn : prevBtn;
                btn.style.transform = 'scale(1.2)';
                setTimeout(() => btn.style.transform = '', 160);
            }

            prevBtn.addEventListener('click', () => moveSlide(-1));
            nextBtn.addEventListener('click', () => moveSlide(1));

            // Cursor + Parallaxe 3D
            let mouseX = 0, mouseY = 0;
            function updateCursor() {
                cursor.style.left = mouseX + 'px';
                cursor.style.top = mouseY + 'px';
                requestAnimationFrame(updateCursor);
            }
            updateCursor();

            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
                const rotX = (window.innerHeight/2 - mouseY) / 85;
                const rotY = (window.innerWidth/2 - mouseX) / 85;
                const container = document.querySelector('.slider-container');
                if (container) container.style.transform = `rotateX(${rotX}deg) rotateY(${-rotY}deg)`;
            });

            document.querySelectorAll('.glass-card').forEach(card => {
                card.addEventListener('mousemove', (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = (e.clientX - rect.left) / rect.width - 0.5;
                    const y = (e.clientY - rect.top) / rect.height - 0.5;
                    card.style.transform = `perspective(1200px) rotateX(${y*6}deg) rotateY(${x*6}deg) translateY(-6px) translateZ(25px)`;
                });
                card.addEventListener('mouseleave', () => card.style.transform = '');
            });

            document.querySelectorAll('.nav-btn, .glass-card, .badge, .nav-ui').forEach(el => {
                el.addEventListener('mouseenter', () => cursor.classList.add('active'));
                el.addEventListener('mouseleave', () => cursor.classList.remove('active'));
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight') moveSlide(1);
                if (e.key === 'ArrowLeft') moveSlide(-1);
            });

            updateUI();
        })();
    </script>
</body>
</html>
